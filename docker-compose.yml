services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: movie-nest-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '${PORT:-4000}:${PORT:-4000}'
    volumes:
      - uploads:/app/uploads
    networks:
      - shared_movie_net

volumes:
  uploads:

networks:
  shared_movie_net:
    external: true
    name: shared_movie_net